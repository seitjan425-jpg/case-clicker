<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Clicker</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
background:#1e293b;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px #000;
}

h1{
margin-top:0;
}

.balance{
font-size:30px;
margin:20px 0;
color:#ffd700;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#3b82f6;
color:white;
transition:.2s;
}

button:active{
transform:scale(.97);
}

#case{
background:#9333ea;
}

.item{
margin-top:20px;
font-size:20px;
color:#00ff99;
}
</style>
</head>

<body>

<div class="card">

<h1>📦 Case Clicker</h1>

<div class="balance">
🪙 <span id="coins">0</span>
</div>

<button onclick="mine()">
💰 Заработать
</button>

<button id="case" onclick="openCase()">
📦 Открыть кейс (50)
</button>

<div class="item" id="item"></div>

</div>

<script>

let coins=0;

const items=[
"🟢 Обычный меч",
"🔵 Редкий меч",
"🟣 Эпический меч",
"🟡 Легендарный меч",
"💎 Мифический меч"
];

function update(){
document.getElementById("coins").innerText=coins;
}

function mine(){
coins++;
update();
}

function openCase(){

if(coins<50){
alert("Недостаточно монет!");
return;
}

coins-=50;

let chance=Math.random();

let reward;

if(chance<0.55)
reward=items[0];

else if(chance<0.8)
reward=items[1];

else if(chance<0.93)
reward=items[2];

else if(chance<0.99)
reward=items[3];

else
reward=items[4];

document.getElementById("item").innerHTML=
"🎉 Выпало:<br><b>"+reward+"</b>";

update();

}

update();

</script>

</body>
</html>
